services:
  redis:
    image: redis:alpine
    restart: always
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: ./backend
    restart: always
    container_name: spring_app
    ports:
      - "8080"
    environment:
      STEAM_API_KEY: ${STEAM_API_KEY}
    depends_on:
      - redis

  web:
    build: ./frontend
    container_name: next_frontend
    ports:
      - "3000"
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
    depends_on:
      - web
      - app

volumes:
  redis_data:
